name: noteworthy
description: "词弦 - 双模块轻量级学习工具"
publish_to: 'none'
version: 0.3.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  ffi: ^2.1.0
  google_fonts: ^6.2.1
  window_manager: ^0.5.1
  path_provider: ^2.1.0
  file_picker: ^8.0.0
  uuid: ^4.0.0
  hotkey_manager: ^0.2.3
  url_launcher: ^6.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  windows:
    generate: true
    image_path: windows/runner/resources/icon.png
    icon_size: 48

flutter:
  uses-material-design: true
  assets:
    - assets/data/
    - assets/icon/
